<!DOCTYPE html>
<html>
<head>
  <title>Login - Lost & Found</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

  <div class="left">
    <div class="overlay">
    <h1>Find & Recover <span>With Ease</span></h1>
    <p>Login to access your college lost & found portal.</p>
    </div>
</div>

  <div class="right">
    <div class="login-box">
      <h2>Student Login</h2>

      <input type="text" id="reg" placeholder="Registration Number">
      <input type="password" id="pass" placeholder="Password">

      <button onclick="login()">Login</button>

      <p id="error"></p>
    </div>
  </div>

</div>

<script src="login.js"></script>

</body>
</html>
